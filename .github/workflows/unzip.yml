name: unzip release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4.2.2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: unzip
        run: |
          for f in *.zip; do
            [ -f "$f" ] || continue
            echo "extracting $f"
            unzip -o "$f"
            rm "$f"
          done

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: extract zip"
          git push
