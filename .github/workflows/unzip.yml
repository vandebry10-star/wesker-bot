name: unzip release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4.2.2

      - name: unzip
        run: |
          if [ ! -f "wesker-bot.zip" ]; then
            echo "wesker-bot.zip not found"
            exit 1
          fi
          unzip -o wesker-bot.zip
          rm wesker-bot.zip

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: extract wesker-bot.zip"
          git push
