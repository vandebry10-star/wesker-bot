name: Extract

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug repo
        run: |
          ls -lah

      - name: Validate zip
        run: |
          file wesker-bot.zip
          unzip -t wesker-bot.zip

      - name: Extract
        run: |
          unzip -o wesker-bot.zip
          ls -lah

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "extract wesker bot"
          git push
