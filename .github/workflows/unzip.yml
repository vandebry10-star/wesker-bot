name: Extract wesker-bot.zip (manual)

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -lah

      - name: Extract app.zip
        run: |
          unzip wesker-bot.zip -d temp
          cp -r temp/* .
          rm -rf temp wesker-bot.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "febry drowning in termiuskuraaa"
          git push
