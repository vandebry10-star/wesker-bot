name: Replace dev → owner

on:
  workflow_dispatch:

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Replace "dev" with "owner"
        run: |
          echo "Replacing 'dev' → 'owner'..."

          # replace di semua file (exclude node_modules & .git)
          grep -rl --exclude-dir=node_modules --exclude-dir=.git 'dev' . | while read file; do
            sed -i 's/\bdev\b/owner/g' "$file"
          done

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "chore: replace dev → owner" || echo "no changes"

      - name: Push
        run: git push
